# Хелперы для экрана вызова домофона «Электронный город».
#
# Два общих (на всю систему, не на дверь) хелпера, связывающих автоматизации и
# дашборд экрана вызова:
#   • input_text  — какой замок сейчас звонит (дашборд выбирает блок двери по
#                   его значению; пусто = «нет активного вызова»);
#   • input_boolean — идёт ли SIP-разговор (дашборд переключает ringing ↔ in-call;
#                   автоматизации не гасят экран, пока разговор активен).
#
# Установка — любой из вариантов:
#   1) UI: Настройки → Устройства и службы → Вспомогательные → Создать → «Текст» и
#      «Переключатель» с такими же entity_id (рекомендуется).
#   2) Пакет: положите файл в config/packages/ и включите packages в configuration.yaml:
#        homeassistant:
#          packages: !include_dir_named packages
#
# Имена entity_id можно изменить — главное, чтобы они совпадали в blueprint-ах
# (doorbell_call_notify, doorbell_screen_controller) и на дашборде.

input_text:
  eg_doorbell_active_lock:
    name: Домофон — активный замок вызова
    # entity_id замка может быть длинным — берём запас.
    max: 255

input_boolean:
  eg_doorbell_sip_active:
    name: Домофон — SIP-разговор активен
