blueprint:
  name: Электронный город — ответ на вызов домофона
  description: >
    При вызове домофона (event-сущность стреляет `ring`) присылает на телефон
    actionable-уведомление с кнопками «Ответить» и «Сбросить».

    «Ответить» → вызывает `elektronny_gorod.answer` (модель REGISTER-on-answer:
    интеграция минтит SIP-креды, регистрируется и принимает вызов — двусторонний
    звук к панели). «Сбросить» → `elektronny_gorod.hangup`.

    Требует Home Assistant Companion App (actionable-уведомления). Уведомление
    high-priority (звонко-подобное) и снимается, когда вызов принят/завершён.

    После ответа звук гостя выводится отдельным механизмом (следующий слайс
    фичи) — этот blueprint поднимает приём вызова из уведомления.
  domain: automation
  author: elektronny_gorod
  input:
    doorbell_event:
      name: Сущность вызова домофона
      description: >
        `event`-сущность домофона (EventDeviceClass.DOORBELL) от интеграции
        «Электронный город». Стреляет `ring` при входящем вызове.
      selector:
        entity:
          filter:
            - domain: event
              integration: elektronny_gorod
    notify_device:
      name: Телефон для уведомления
      description: >
        Устройство с установленным Home Assistant Companion App — на него
        придёт actionable-уведомление с кнопками.
      selector:
        device:
          integration: mobile_app

mode: queued
max: 10

triggers:
  - trigger: state
    entity_id: !input doorbell_event
    id: doorbell_state
  - trigger: event
    event_type: mobile_app_notification_action
    event_data:
      action: EG_ANSWER
    id: answer
  - trigger: event
    event_type: mobile_app_notification_action
    event_data:
      action: EG_HANGUP
    id: hangup

actions:
  - choose:
      # Входящий вызов → actionable-пуш с кнопками.
      - conditions:
          - condition: trigger
            id: doorbell_state
          - condition: template
            value_template: "{{ trigger.to_state.attributes.event_type == 'ring' }}"
        sequence:
          - device_id: !input notify_device
            domain: mobile_app
            type: notify
            title: "Вызов домофона"
            message: >-
              {{ trigger.to_state.attributes.gate_name or 'Кто-то у двери' }}
              {%- if trigger.to_state.attributes.apartment %}
              (кв. {{ trigger.to_state.attributes.apartment }})
              {%- endif %}
            data:
              tag: eg_doorbell
              persistent: true
              # Android — высокий приоритет, отдельный канал (звонко-подобно).
              channel: "Вызов домофона"
              importance: high
              priority: high
              ttl: 0
              # iOS — time-sensitive.
              push:
                interruption-level: time-sensitive
              actions:
                - action: EG_ANSWER
                  title: "Ответить"
                - action: EG_HANGUP
                  title: "Сбросить"

      # Вызов завершён/принят на другом устройстве → снять уведомление.
      - conditions:
          - condition: trigger
            id: doorbell_state
          - condition: template
            value_template: "{{ trigger.to_state.attributes.event_type == 'ended' }}"
        sequence:
          - device_id: !input notify_device
            domain: mobile_app
            type: notify
            message: "clear_notification"
            data:
              tag: eg_doorbell

      # Кнопка «Ответить» → принять вызов + снять уведомление.
      - conditions:
          - condition: trigger
            id: answer
        sequence:
          - action: elektronny_gorod.answer
          - device_id: !input notify_device
            domain: mobile_app
            type: notify
            message: "clear_notification"
            data:
              tag: eg_doorbell

      # Кнопка «Сбросить» → завершить вызов + снять уведомление.
      - conditions:
          - condition: trigger
            id: hangup
        sequence:
          - action: elektronny_gorod.hangup
          - device_id: !input notify_device
            domain: mobile_app
            type: notify
            message: "clear_notification"
            data:
              tag: eg_doorbell
