name: Python Tests

on:
  push:
    branches:
      - master
    paths:
      - 'custom_components/**'
      - 'tests/**'
      - 'pytest.ini'
      - 'requirements_test.txt'
      - '.github/workflows/python-tests.yaml'
  pull_request:
    paths:
      - 'custom_components/**'
      - 'tests/**'
      - 'pytest.ini'
      - 'requirements_test.txt'
      - '.github/workflows/python-tests.yaml'
  workflow_dispatch:

jobs:
  pytest:
    name: pytest (py${{ matrix.python-version }}, HA ${{ matrix.ha-label }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - phc-version: '0.13.175'
            ha-label: '2024.10 (min)'
            python-version: '3.12'
          - phc-version: '0.13.333'
            ha-label: '2026.5 (current)'
            python-version: '3.14'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: requirements_test.txt

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest-homeassistant-custom-component==${{ matrix.phc-version }}
          pip install -r requirements_test.txt

      - name: Apply legacy HA constraint (josepy<2)
        if: matrix.phc-version == '0.13.175'
        run: |
          # HA 2024.10 транзитивно тянет acme<3, которая всё ещё ожидает
          # josepy.ComparableX509. josepy>=2 этот атрибут удалил
          # → AttributeError при загрузке pytest-homeassistant-custom-component.
          # Для current (HA 2026.5+) acme>=3 + josepy>=2 уже совместимы.
          pip install 'josepy<2'

      - name: Run pytest
        run: |
          pytest tests/ -v \
            --cov=custom_components.elektronny_gorod \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}-phc${{ matrix.phc-version }}
          path: coverage.xml
          if-no-files-found: ignore
          retention-days: 14
